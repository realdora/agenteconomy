      <div style="max-width:900px;margin:0 auto;padding:40px 24px;font-family:Inter,system-ui,sans-serif;color:#111827">
        <h1>Agent Economy Monitor — Tracking the Agentic Economy</h1>
        <p>agenteconomy.to is the leading free dashboard for real-time on-chain data tracking AI agent payment activity. We aggregate events from 4 open standards across 8 blockchains.</p>

        <h2>What is the Agent Economy?</h2>
        <p>The agent economy (also called the agentic economy) is the emerging ecosystem where autonomous AI agents transact, pay for services, and settle payments on-chain without human intervention. As AI agents become economic actors, new payment protocols are being built to support machine-to-machine commerce using stablecoins and smart contracts.</p>

        <h2>Protocols We Track</h2>

        <h3>x402 Protocol — HTTP-Native Agent Payments</h3>
        <p>x402 is an open HTTP payment standard by Coinbase using the HTTP 402 status code. It enables AI agents to pay for API resources per request. Foundation members include Google, Visa, AWS, Circle, Anthropic, Vercel, and Cloudflare. x402 is the dominant agent payment protocol by transaction volume, with over 139 million on-chain events across Base, Solana, Polygon, BNB, Avalanche, Arbitrum, and SEI.</p>

        <h3>ERC-8004 — Agent Identity on Base</h3>
        <p>ERC-8004 defines AI agent identity and reputation on Base. Proposed by the Ethereum Foundation dAI team with MetaMask, Google, and Coinbase. It tracks agent registry interactions including infrastructure and consumer events, with over 700,000 total events year-to-date.</p>

        <h3>ERC-8183 — Virtuals ACP Agent Commerce</h3>
        <p>ERC-8183 (Virtuals Agent Commerce Protocol) enables trustless agent-to-agent commerce with escrowed payments and evaluator verification. ACP tracks job lifecycle memos — create, deliver, evaluate, settle — across 3,400+ autonomous agents with over $3M in agent GDP.</p>

        <h3>MPP — Tempo / Stripe Machine Payment Protocol</h3>
        <p>MPP is an open HTTP payment standard co-authored by Stripe and Tempo. Tempo is a payments-focused EVM-compatible L1 incubated by Stripe and Paradigm. MPP tracks on-chain stablecoin settlement events for agent-to-service payments including channel operations and settlement finalization.</p>

        <h2>Data Sources and Methodology</h2>
        <p>All data comes from verified on-chain smart contracts. Sources include Dune Analytics community queries by @thechriscen, @hashed_official, and @ax1research, plus direct Tempo RPC indexing. Data refreshes every 6 hours. Raw counts include ecosystem testing, self-dealing, and infrastructure activity. Off-chain payments (Google UCP, Visa TAP) are not tracked.</p>

        <h2>Agent Economy Dashboard Features</h2>
        <ul>
          <li>Real-time aggregated on-chain event counter across all 4 standards</li>
          <li>USD volume settled via x402 protocol</li>
          <li>Chain distribution analysis (Base, Solana, Polygon, BNB, Avalanche, Arbitrum, SEI, Tempo)</li>
          <li>Facilitator market share breakdown (Coinbase, Dexter, PayAI, DayDreams, ThirdWeb)</li>
          <li>Daily and monthly time-series charts with 7-day moving averages</li>
          <li>Week-over-week delta indicators</li>
          <li>Light and dark theme support</li>
        </ul>

        <p>Built by <a href="https://x.com/realdora_eth">@realdora_eth</a>. Open data available at <a href="https://agenteconomy.to/data.json">agenteconomy.to/data.json</a>.</p>
